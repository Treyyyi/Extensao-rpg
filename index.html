<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exemplo Básico Owlbear</title>
  <style>
    :root {
      --bg: #16181d;
      --panel: #21252d;
      --text: #f3f4f6;
      --muted: #a7b0be;
      --accent: #4ea1ff;
      --border: #313743;
      --ok: #23c483;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { padding: 16px; display: grid; gap: 12px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
    h1 { font-size: 18px; margin: 0 0 6px; }
    p { margin: 0; color: var(--muted); line-height: 1.45; font-size: 14px; }
    .status { font-size: 13px; color: var(--ok); font-weight: 600; }
    button { border: 0; border-radius: 10px; padding: 10px 12px; background: var(--accent); color: white; font-weight: 700; cursor: pointer; }
    .small { font-size: 12px; color: var(--muted); }
    code { background: #111319; padding: 2px 6px; border-radius: 6px; border: 1px solid var(--border); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Extensão básica</h1>
      <p>Versão preparada para hospedagem em GitHub Pages.</p>
    </section>

    <section class="card">
      <div id="status" class="status">Verificando ambiente...</div>
      <p style="margin-top:8px;">Se estiver aberta dentro do Owlbear, a notificação deve funcionar.</p>
    </section>

    <section class="card">
      <button id="btn">Mostrar mensagem</button>
      <p style="margin-top:8px;">Teste simples de integração com o SDK.</p>
    </section>

    <section class="card small">
      Importante: os caminhos no manifest usam <code>./</code> para funcionar melhor no GitHub Pages.
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
